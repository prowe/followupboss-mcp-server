AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: followupboss-mcp-server on Lambda Function URL

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 1024
    Tracing: Active

Resources:
  FollowUpBossMcpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: followupboss-mcp-server
      CodeUri: .
      Handler: lambda.lambdaHandler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MCP_TRANSPORT: http
          MCP_AUTH_DISABLED: true
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

Outputs:
  FollowUpBossMcpFunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt FollowUpBossMcpFunctionUrl.FunctionUrl
